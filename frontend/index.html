<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>G2 Web-Editor</title>
  <style>
    :root {
      --bg: #1d1f24; --panel: #26282e; --border: #3c3f47; --text: #e8e8e8;
      --dim: #9aa0aa; --accent: #e0a030; --ok: #6abf69; --bad: #d05050;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }

    header {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: .6rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1rem; margin: 0; }
    #patchname { color: var(--accent); }
    #conn { font-size: .8rem; }
    #conn.ok::before { content: "● "; color: var(--ok); }
    #conn.bad::before { content: "● "; color: var(--bad); }

    #variations { display: flex; gap: .25rem; margin-left: auto; }
    #variations button {
      width: 2rem; height: 2rem; border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--text); cursor: pointer; font-size: .85rem;
    }
    #variations button.active { background: var(--accent); color: #222; border-color: var(--accent); }

    #undoredo { display: flex; gap: .25rem; }
    #undoredo button {
      width: 2rem; height: 2rem; border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--text); cursor: pointer; font-size: 1rem;
    }
    #undoredo button:disabled { opacity: .35; cursor: default; }

    #export { display: flex; gap: .25rem; }
    #export a, #export button {
      border: 1px solid var(--border); border-radius: 4px; padding: 0 .5rem;
      height: 2rem; display: flex; align-items: center; background: none;
      color: var(--text); cursor: pointer; font-size: .8rem; text-decoration: none;
    }
    #export a:hover, #export button:hover { border-color: var(--accent); }

    #slots { display: flex; gap: .25rem; }
    #slots button {
      height: 2rem; padding: 0 .55rem; border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--text); cursor: pointer; font-size: .8rem;
      max-width: 9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #slots button .pname { color: var(--dim); font-size: .72rem; margin-left: .35rem; }
    #slots button.active { border-color: var(--accent); }
    #slots button.active, #slots button.active .pname { color: var(--accent); }

    main { display: grid; grid-template-columns: 16rem 1fr 19rem; gap: 0; min-height: calc(100vh - 3.2rem); }

    #banks {
      border-right: 1px solid var(--border); padding: .8rem; overflow-y: auto;
      max-height: calc(100vh - 3.2rem); position: sticky; top: 3.2rem;
    }
    #banks h2 { font-size: .8rem; text-transform: uppercase; color: var(--dim); margin: .2rem 0 .6rem; }
    #banks details { margin-bottom: .4rem; }
    #banks summary { cursor: pointer; font-size: .85rem; color: var(--dim); }
    #banks li {
      list-style: none; font-size: .85rem; padding: .15rem .3rem; cursor: pointer;
      border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #banks li:hover { background: var(--border); }
    #banks ul { padding-left: .6rem; margin: .3rem 0; }

    /* Performance-Panel (Name, Master-Clock, Slot-Flags/-Ranges) */
    #perfpanel { border: 1px solid var(--border); border-radius: 6px; padding: .5rem .6rem;
      margin-bottom: .8rem; background: var(--panel); font-size: .78rem; }
    #perfpanel .pname { width: 100%; padding: .2rem .35rem; border: 1px solid transparent;
      border-radius: 3px; background: none; color: var(--accent); font: inherit;
      font-size: .85rem; margin-bottom: .4rem; }
    #perfpanel .pname:hover, #perfpanel .pname:focus {
      border-color: var(--border); outline: none; background: #16171b; }
    #perfpanel .row { display: flex; align-items: center; gap: .4rem; margin: .25rem 0; color: var(--dim); }
    #perfpanel input[type=number] { width: 3.6rem; background: #16181c; color: var(--text);
      border: 1px solid var(--border); border-radius: 3px; font-size: .78rem; padding: .1rem .2rem; }
    #perfpanel input[type=checkbox] { accent-color: var(--accent); margin: 0; }
    #perfpanel table { border-collapse: collapse; width: 100%; margin-top: .3rem; }
    #perfpanel th { color: var(--dim); font-weight: normal; font-size: .68rem; text-align: center; padding: 0 .1rem; }
    #perfpanel td { text-align: center; padding: .1rem .1rem; }
    #perfpanel td.sl { color: var(--text); font-weight: bold; }
    #perfpanel td .range { width: 2.6rem; }
    #perfpanel .note { font-size: .65rem; color: var(--dim); display: block; }
    #perfpanel .gknobs { margin-top: .4rem; }
    #perfpanel .gknobs summary { cursor: pointer; color: var(--dim); font-size: .72rem; }
    #perfpanel .gknobs ul { list-style: none; padding: .2rem 0 0 .3rem; margin: 0; }
    #perfpanel .gknobs li { display: flex; align-items: center; gap: .35rem;
      font-size: .72rem; color: var(--text); padding: .08rem 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #perfpanel .gknobs li button { margin-left: auto; border: none; background: none;
      color: var(--dim); cursor: pointer; font-size: .72rem; padding: 0 .15rem; }
    #perfpanel .gknobs li button:hover { color: var(--accent); }
    #perfpanel .gknobs .hint { font-size: .68rem; color: var(--dim); padding: .2rem 0 0 .3rem; }
    #perfpanel .row button { border: 1px solid var(--border); border-radius: 3px;
      background: none; color: var(--text); cursor: pointer; font-size: .72rem;
      padding: .12rem .5rem; }
    #perfpanel .row button:hover { border-color: var(--accent); }

    #patch { padding: 1rem; overflow-x: auto; }
    .area-title {
      font-size: .8rem; text-transform: uppercase; color: var(--dim); margin: 1rem 0 .5rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .area-title .zoom button {
      width: 1.5rem; height: 1.5rem; border: 1px solid var(--border); border-radius: 3px;
      background: none; color: var(--text); cursor: pointer;
    }
    .area-title .addmod { display: flex; gap: .3rem; }
    .area-title .addmod input {
      width: 9rem; padding: .15rem .4rem; border: 1px solid var(--border);
      border-radius: 3px; background: none; color: var(--text); font-size: .8rem;
    }
    .area-title .addmod button {
      width: 1.5rem; height: 1.5rem; border: 1px solid var(--border); border-radius: 3px;
      background: none; color: var(--text); cursor: pointer;
    }
    svg.area { display: block; background: #16171b; border: 1px solid var(--border); border-radius: 4px; }
    svg.area g.mod { cursor: pointer; }
    svg.area g.mod rect.body { stroke: #16171b; stroke-width: 1; }
    svg.area g.mod.selected rect.body { stroke: var(--accent); stroke-width: 2; }
    svg.area text { font-family: system-ui, sans-serif; pointer-events: none; user-select: none; }

    #params {
      border-left: 1px solid var(--border); padding: .8rem; overflow-y: auto;
      max-height: calc(100vh - 3.2rem); position: sticky; top: 3.2rem;
    }
    #params h2 { font-size: .8rem; text-transform: uppercase; color: var(--dim); margin: .2rem 0 .6rem; }
    #params .module { border: 1px solid var(--border); border-radius: 6px; padding: .6rem .8rem; background: var(--panel); }
    #params .module h3 { margin: 0 0 .45rem; font-size: .9rem; display: flex; justify-content: space-between; gap: .4rem; align-items: center; }
    #params .module h3 .type { color: var(--dim); font-weight: normal; font-size: .8rem; }
    #params .module h3 img { image-rendering: pixelated; }
    #params .module h3 .modname {
      flex: 1; min-width: 0; padding: .15rem .35rem; border: 1px solid transparent;
      border-radius: 3px; background: none; color: var(--text); font: inherit;
    }
    #params .module h3 .modname:hover, #params .module h3 .modname:focus {
      border-color: var(--border); outline: none; background: #16171b;
    }
    #params .modcolors { display: flex; flex-wrap: wrap; gap: 3px; margin: 0 0 .6rem; }
    #params .modcolors button {
      width: 16px; height: 16px; border: 1px solid #16171b; border-radius: 3px;
      cursor: pointer; padding: 0;
    }
    #params .modcolors button.active { border: 2px solid var(--accent); }
    #params .hint { color: var(--dim); font-size: .85rem; }
    #params h4 { margin: .7rem 0 .3rem; font-size: .75rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: .04em; }
    #params .param select {
      width: 100%; background: #16181c; color: var(--text);
      border: 1px solid var(--border); border-radius: 4px; font-size: .75rem; padding: .1rem;
    }
    .morphrow { display: flex; gap: .35rem; align-items: center; margin: -1px 0 6px;
      font-size: .68rem; color: var(--dim); }
    .morphrow select, .morphrow input {
      background: #16181c; color: var(--text); border: 1px solid var(--border);
      border-radius: 3px; font-size: .68rem; padding: 0 .15rem;
    }
    .morphrow input { width: 3.2rem; }
    .morphassigns { font-size: .68rem; color: var(--dim); margin: -2px 0 6px; }
    .morphgroup { margin-bottom: 6px; }
    .morphhead { display: flex; gap: .35rem; align-items: center; margin-bottom: 1px; }
    .morphhead .mtag { color: var(--accent); font-weight: 600; font-size: .72rem; width: 1.8rem; }
    .morphhead .mlabel { flex: 1; min-width: 0; background: #16181c; color: var(--text);
      border: 1px solid transparent; border-radius: 3px; font-size: .72rem; padding: .1rem .3rem; }
    .morphhead .mlabel:hover, .morphhead .mlabel:focus { border-color: var(--border); outline: none; }
    .morphhead .mmode { background: #16181c; color: var(--text); border: 1px solid var(--border);
      border-radius: 3px; font-size: .68rem; padding: 0 .15rem; }
    .param { display: grid; grid-template-columns: 6.5rem 1fr 2.6rem; gap: .5rem; align-items: center; font-size: .8rem; }
    .param label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--dim); }
    .param span { text-align: right; font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>G2 <span id="patchname">—</span></h1>
    <span id="perfinfo" style="font-size:.8rem;color:var(--dim)"></span>
    <span id="conn" class="bad">connecting…</span>
    <div id="undoredo">
      <button id="undobtn" title="Undo (⌘Z)" disabled>↶</button>
      <button id="redobtn" title="Redo (⇧⌘Z)" disabled>↷</button>
    </div>
    <div id="export">
      <a href="/api/patch/export" download title="Download active slot as a Clavia patch (.pch2)">⬇&nbsp;.pch2</a>
      <a href="/api/perf/export" download title="Download performance as a Clavia file (.prf2)">⬇&nbsp;.prf2</a>
      <button id="importbtn" title="Load a Clavia .pch2 file into the active slot (overwrites the slot)">⬆&nbsp;.pch2</button>
      <input id="importfile" type="file" accept=".pch2" hidden>
      <button id="importperfbtn" title="Load a Clavia .prf2 file as a whole performance (overwrites all 4 slots)">⬆&nbsp;.prf2</button>
      <input id="importperffile" type="file" accept=".prf2" hidden>
      <button id="importdx7btn" title="Convert a Yamaha DX7 voice (.syx) and load it into the active slot (overwrites the slot)">⬆&nbsp;.syx</button>
      <input id="importdx7file" type="file" accept=".syx,.bin" hidden>
    </div>
    <div id="slots"></div>
    <div id="variations"></div>
  </header>
  <main>
    <nav id="banks">
      <div id="perfpanel" hidden></div>
      <h2>Patches</h2><div id="banklist">loading…</div>
      <h2 style="margin-top:.8rem">Performances</h2><div id="perflist">loading…</div>
    </nav>
    <section id="patch"></section>
    <aside id="params"><h2>Module</h2><div id="paramsbody" class="hint">Click a module</div></aside>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
